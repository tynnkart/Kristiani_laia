<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Bites - Fresh & Tasty</title>
    <style>
        :root {
            --primary-green: #2d6a4f;    /* Hijau Tua Botol */
            --light-green: #d8f3dc;      /* Hijau Sangat Muda */
            --accent-green: #52b788;     /* Hijau Daun Segar */
            --white: #ffffff;
            --cancel-red: #ff4d4d;
            --text-dark: #1b4332;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-green);
            background-image: radial-gradient(circle at top right, #b7e4c7, transparent);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: var(--primary-green);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Produk Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--white);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-10px) rotate(2deg); /* Sedikit putar saat hover */
            background: var(--white);
            box-shadow: 0 15px 30px rgba(45, 106, 79, 0.2);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 15px;
        }

        .card h3 {
            margin: 10px 0;
            font-size: 1.2rem;
        }

        .price-tag {
            color: var(--primary-green);
            font-weight: 800;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 15px;
        }

        .btn-buy {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-buy:hover {
            background: var(--accent-green);
            letter-spacing: 1px;
        }

        /* Struk Section */
        .receipt-container {
            background: var(--white);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
            border-top: 8px solid var(--primary-green);
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .btn-cancel {
            background: var(--cancel-red);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .total-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid var(--primary-green);
            font-size: 1.4rem;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
        }

        .btn-print {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(82, 183, 136, 0.4);
        }

        .btn-print:hover {
            transform: scale(1.02);
            background: var(--primary-green);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .receipt-container { position: static; }
        }

        /* Print Mode */
        @media print {
            body { background: white; padding: 0; }
            .products-grid, .btn-buy, .btn-print, .btn-cancel, h1 { display: none !important; }
            .receipt-container { 
                box-shadow: none; 
                border: none; 
                width: 100%; 
                padding: 0;
            }
            .container { display: block; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <h1>🌿 Green Bites Menu</h1>

    <div class="container">
        <!-- Produk -->
        <div class="products-grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" alt="Salad">
                <h3>Salad Organik</h3>
                <span class="price-tag">Rp 35.000</span>
                <button class="btn-buy" onclick="tambahItem('Salad Organik', 35000)">Tambah ke Keranjang</button>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1547517023-7ca0c162f816?w=400" alt="Juice">
                <h3>Green Smoothies</h3>
                <span class="price-tag">Rp 25.000</span>
                <button class="btn-buy" onclick="tambahItem('Green Smoothies', 25000)">Tambah ke Keranjang</button>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1540703600305-15917823ecf2?w=400" alt="Wrap">
                <h3>Veggie Wrap</h3>
                <span class="price-tag">Rp 40.000</span>
                <button class="btn-buy" onclick="tambahItem('Veggie Wrap', 40000)">Tambah ke Keranjang</button>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1546793665-c74683c3f43d?w=400" alt="Sandwich">
                <h3>Avocado Toast</h3>
                <span class="price-tag">Rp 30.000</span>
                <button class="btn-buy" onclick="tambahItem('Avocado Toast', 30000)">Tambah ke Keranjang</button>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1511690656952-34342bb7c2f2?w=400" alt="Soup">
                <h3>Sup Sayur Hangat</h3>
                <span class="price-tag">Rp 20.000</span>
                <button class="btn-buy" onclick="tambahItem('Sup Sayur Hangat', 20000)">Tambah ke Keranjang</button>
            </div>
        </div>

        <!-- Struk Belanja -->
        <div class="receipt-container" id="printable-area">
            <div class="receipt-header">
                <h2 style="margin:0; color: var(--primary-green);">GREEN BITES</h2>
                <small>Healthy Food, Happy Life</small>
            </div>
            
            <div id="item-list">
                <p style="text-align: center; color: #999;">Keranjang kosong</p>
            </div>

            <div class="total-box">
                <span>Total</span>
                <span id="total-price">Rp 0</span>
            </div>

            <button class="btn-print" onclick="window.print()">SELESAIKAN & CETAK</button>
        </div>
    </div>

    <script>
        let keranjang = [];

        function tambahItem(nama, harga) {
            const id = Date.now();
            keranjang.push({ id, nama, harga });
            updateTampilan();
        }

        function hapusItem(id) {
            keranjang = keranjang.filter(item => item.id !== id);
            updateTampilan();
        }

        function updateTampilan() {
            const listElement = document.getElementById('item-list');
            const totalElement = document.getElementById('total-price');
            
            if (keranjang.length === 0) {
                listElement.innerHTML = '<p style="text-align: center; color: #999;">Keranjang kosong</p>';
                totalElement.innerText = 'Rp 0';
                return;
            }

            listElement.innerHTML = '';
            let total = 0;

            keranjang.forEach(item => {
                total += item.harga;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>
                        <strong>${item.nama}</strong><br>
                        <small>Rp ${item.harga.toLocaleString()}</small>
                    </div>
                    <button class="btn-cancel" onclick="hapusItem(${item.id})">Batal</button>
                `;
                listElement.appendChild(div);
            });

            totalElement.innerText = `Rp ${total.toLocaleString()}`;
        }
    </script>
</body>
</html>
